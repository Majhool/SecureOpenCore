name: Auto-Sign OpenCore

on:
  schedule:
    - cron: '0 * * * *' # Check every hour
  workflow_dispatch: # Allow manual trigger

jobs:
  check-and-sign:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to create a release
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y sbsigntool jq unzip zip

      - name: Fetch latest.json
        id: fetch-latest
        run: |
          JSON=$(curl -s https://raw.githubusercontent.com/dortania/build-repo/builds/latest.json)
          VERSION=$(echo "$JSON" | jq -r '.OpenCorePkg.versions[0].version')
          SHA=$(echo "$JSON" | jq -r '.OpenCorePkg.versions[0].commit.sha')
          SHORT_SHA=${SHA:0:7}
          DEBUG_URL=$(echo "$JSON" | jq -r '.OpenCorePkg.versions[0].links.debug')
          RELEASE_URL=$(echo "$JSON" | jq -r '.OpenCorePkg.versions[0].links.release')
          
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "sha=$SHA" >> $GITHUB_OUTPUT
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "debug_url=$DEBUG_URL" >> $GITHUB_OUTPUT
          echo "release_url=$RELEASE_URL" >> $GITHUB_OUTPUT
          echo "release_tag=OpenCore-${VERSION}-${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Check if release already exists
        id: check-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.fetch-latest.outputs.release_tag }}"
          if gh release view "$TAG" > /dev/null 2>&1; then
            echo "Release $TAG already exists. Skipping."
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "Release $TAG does not exist. Proceeding."
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Keys
        if: steps.check-release.outputs.exists == 'false'
        run: |
          echo "${{ secrets.ISK_KEY }}" > ISK.key
          echo "${{ secrets.ISK_PEM }}" > ISK.pem

      - name: Download & Extract
        if: steps.check-release.outputs.exists == 'false'
        run: |
          wget -q "${{ steps.fetch-latest.outputs.debug_url }}" -O debug.zip
          wget -q "${{ steps.fetch-latest.outputs.release_url }}" -O release.zip
          
          unzip -q debug.zip -d OpenCore-DEBUG
          unzip -q release.zip -d OpenCore-RELEASE

      - name: Sign EFI files
        if: steps.check-release.outputs.exists == 'false'
        run: |
          chmod +x sign_local_efi.sh
          
          # Sign DEBUG
          echo "Signing DEBUG..."
          ./sign_local_efi.sh OpenCore-DEBUG/X64
          cp -r Signed/OpenCore-DEBUG/* OpenCore-DEBUG/
          rm -rf Signed
          
          # Sign RELEASE
          echo "Signing RELEASE..."
          ./sign_local_efi.sh OpenCore-RELEASE/X64
          cp -r Signed/OpenCore-RELEASE/* OpenCore-RELEASE/
          rm -rf Signed

      - name: Handle HfsPlus.efi
        if: steps.check-release.outputs.exists == 'false'
        run: |
          # Download HfsPlus.efi
          echo "Downloading HfsPlus.efi..."
          mkdir -p HfsPlus-temp
          cd HfsPlus-temp
          wget -q "https://raw.githubusercontent.com/acidanthera/OcBinaryData/master/Drivers/HfsPlus.efi" -O HfsPlus.efi
          
          # Check if file was downloaded successfully
          if [ ! -f HfsPlus.efi ]; then
            echo "Failed to download HfsPlus.efi"
            exit 1
          fi
          
          # Calculate checksum of downloaded file
          NEW_CHECKSUM=$(sha256sum HfsPlus.efi | awk '{print $1}')
          echo "Downloaded HfsPlus.efi checksum: $NEW_CHECKSUM"
          
          # Check if Drivers directory exists and if HfsPlus.efi already exists
          IS_NEW=true
          if [ -f "../OpenCore-DEBUG/X64/Drivers/HfsPlus.efi" ]; then
            EXISTING_CHECKSUM=$(sha256sum ../OpenCore-DEBUG/X64/Drivers/HfsPlus.efi | awk '{print $1}')
            if [ "$NEW_CHECKSUM" = "$EXISTING_CHECKSUM" ]; then
              IS_NEW=false
              echo "HfsPlus.efi already exists with same checksum. Skipping signing."
            else
              echo "HfsPlus.efi is different from existing version. Will sign it."
            fi
          else
            echo "HfsPlus.efi not found in existing structure. Will sign it."
          fi
          
          # If new, sign it
          if [ "$IS_NEW" = true ]; then
            echo "Signing HfsPlus.efi..."
            mkdir -p X64/Drivers
            cp HfsPlus.efi X64/Drivers/
            cd ..
            ./sign_local_efi.sh HfsPlus-temp/X64
            
            # Copy signed file to both DEBUG and RELEASE
            mkdir -p OpenCore-DEBUG/X64/Drivers
            mkdir -p OpenCore-RELEASE/X64/Drivers
            cp Signed/HfsPlus-temp/X64/Drivers/HfsPlus.efi OpenCore-DEBUG/X64/Drivers/
            cp Signed/HfsPlus-temp/X64/Drivers/HfsPlus.efi OpenCore-RELEASE/X64/Drivers/

            # Also place into repository path for OCAT
            mkdir -p EFI/OC/Drivers
            cp Signed/HfsPlus-temp/X64/Drivers/HfsPlus.efi EFI/OC/Drivers/HfsPlus.efi

            rm -rf Signed
            echo "Signed HfsPlus.efi added to both packages and EFI/OC/Drivers"
          else
            cd ..
            # Copy existing file to maintain consistency
            mkdir -p OpenCore-DEBUG/X64/Drivers
            mkdir -p OpenCore-RELEASE/X64/Drivers
            cp HfsPlus-temp/HfsPlus.efi OpenCore-DEBUG/X64/Drivers/
            cp HfsPlus-temp/HfsPlus.efi OpenCore-RELEASE/X64/Drivers/

            # Also copy into repository path for OCAT
            mkdir -p EFI/OC/Drivers
            cp HfsPlus-temp/HfsPlus.efi EFI/OC/Drivers/HfsPlus.efi

            echo "Using existing HfsPlus.efi (no signing needed)"
          fi
          
          # Cleanup
          rm -rf HfsPlus-temp

      - name: Commit HfsPlus to repo
        if: steps.check-release.outputs.exists == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -f EFI/OC/Drivers/HfsPlus.efi ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git fetch origin
            BRANCH="add-hfsplus-${{ steps.fetch-latest.outputs.short_sha }}"
            git checkout -b "$BRANCH" || git checkout "$BRANCH"
            git add EFI/OC/Drivers/HfsPlus.efi
            if git diff --staged --quiet; then
              echo "No changes to commit"
            else
              git commit -m "Add/Update HfsPlus.efi (automated)"
              git push --set-upstream origin "$BRANCH"
              echo "Pushed $BRANCH"
            fi
          else
            echo "EFI/OC/Drivers/HfsPlus.efi not present, skipping commit"
          fi

      - name: Repackage
        if: steps.check-release.outputs.exists == 'false'
        run: |
          cd OpenCore-DEBUG
          zip -qr ../OpenCore-${{ steps.fetch-latest.outputs.version }}-DEBUG.zip *
          cd ../OpenCore-RELEASE
          zip -qr ../OpenCore-${{ steps.fetch-latest.outputs.version }}-RELEASE.zip *
          cd ..

      - name: Create Release
        if: steps.check-release.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.fetch-latest.outputs.release_tag }}" \
            --title "OpenCore ${{ steps.fetch-latest.outputs.version }} (${{ steps.fetch-latest.outputs.short_sha }})" \
            --notes "Automated signed release for OpenCorePkg commit ${{ steps.fetch-latest.outputs.sha }}" \
            OpenCore-*.zip

      - name: Ensure security (clean up keys)
        if: always()
        run: |
          rm -f ISK.key ISK.pem
